name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend-GCP/**"
      - ".github/workflows/deploy-backend-gcp.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend-GCP

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gcp-rag-backend-test .
