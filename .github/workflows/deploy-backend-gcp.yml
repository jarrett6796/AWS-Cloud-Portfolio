name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "backend-GCP/**"
      - ".github/workflows/deploy-backend-gcp.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME }}
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ secrets.GCP_SERVICE_NAME }}:${{ github.sha }}
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174,https://dvzu3s2gq6iw.cloudfront.net
      INGESTION_ADMIN_TOKEN: ${{ secrets.INGESTION_ADMIN_TOKEN }}
      RAG_QUERY_REWRITE_ENABLED: "false"
      RAG_QUERY_REWRITE_HISTORY_LIMIT: "6"
      RAG_QUERY_REWRITE_MODEL: gemini-2.5-flash
      RAG_MULTI_QUERY_ENABLED: "false"
      RAG_MULTI_QUERY_COUNT: "3"
      RAG_MULTI_QUERY_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend-GCP
        run: python -m pip install -r requirements.txt

      - name: Run backend unit tests
        working-directory: backend-GCP
        run: python -m unittest discover -s tests

      - name: Compile backend entrypoint
        working-directory: backend-GCP
        run: python -m py_compile main.py app/config/settings.py

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE backend-GCP

      - name: Push Docker image
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --set-env-vars "^|^CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS|INGESTION_ADMIN_TOKEN=$INGESTION_ADMIN_TOKEN|RAG_QUERY_REWRITE_ENABLED=$RAG_QUERY_REWRITE_ENABLED|RAG_QUERY_REWRITE_HISTORY_LIMIT=$RAG_QUERY_REWRITE_HISTORY_LIMIT|RAG_QUERY_REWRITE_MODEL=$RAG_QUERY_REWRITE_MODEL|RAG_MULTI_QUERY_ENABLED=$RAG_MULTI_QUERY_ENABLED|RAG_MULTI_QUERY_COUNT=$RAG_MULTI_QUERY_COUNT|RAG_MULTI_QUERY_MODEL=$RAG_MULTI_QUERY_MODEL" \
            --allow-unauthenticated

      - name: Evaluate deployed RAG quality
        working-directory: backend-GCP
        env:
          RAG_EVAL_BASE_URL: ${{ secrets.RAG_EVAL_BASE_URL }}
        run: |
          EVAL_BASE_URL="${RAG_EVAL_BASE_URL:-https://gcp-rag-backend-189047029621.asia-east1.run.app}"
          python scripts/evaluate_rag.py \
            --base-url "$EVAL_BASE_URL" \
            --output rag_eval_report.md \
            --timeout 45

      - name: Upload RAG evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-report
          path: backend-GCP/rag_eval_report.md
