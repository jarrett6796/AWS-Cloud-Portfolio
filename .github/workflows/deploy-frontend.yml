name: Deploy Frontend to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-AWS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-AWS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create frontend env file
        env:
          VITE_GCP_RAG_API_URL: ${{ secrets.VITE_GCP_RAG_API_URL }}
          VITE_AWS_VISITOR_API_URL: ${{ secrets.VITE_AWS_VISITOR_API_URL }}
          VITE_AWS_PROJECTS_API_BASE_URL: ${{ secrets.VITE_AWS_PROJECTS_API_BASE_URL }}
          VITE_AWS_CONTACT_API_URL: ${{ secrets.VITE_AWS_CONTACT_API_URL }}
        run: |
          GCP_RAG_API_URL="${VITE_GCP_RAG_API_URL:-https://gcp-rag-backend-189047029621.asia-east1.run.app}"
          echo "VITE_GCP_RAG_API_URL=$GCP_RAG_API_URL" > .env
          echo "VITE_AWS_VISITOR_API_URL=$VITE_AWS_VISITOR_API_URL" >> .env
          echo "VITE_AWS_PROJECTS_API_BASE_URL=$VITE_AWS_PROJECTS_API_BASE_URL" >> .env
          echo "VITE_AWS_CONTACT_API_URL=$VITE_AWS_CONTACT_API_URL" >> .env
          echo "Frontend multi-cloud API URLs configured."

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy frontend to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
